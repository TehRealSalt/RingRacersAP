id: io.github.TehRealSalt.RingRacersAP
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: ringracers-ap
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --share=network
  - --persist=.ringracers-ap

modules:
  - name: libyuv
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://chromium.googlesource.com/libyuv/libyuv
        branch: main

  - name: ringracers-ap
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: dir
        path: ../
      - type: file
        path: io.github.TehRealSalt.RingRacersAP.desktop
      - type: file
        path: io.github.TehRealSalt.RingRacersAP.64.png
    config-opts:
      - -DSRB2_SDL2_EXE_NAME=ringracers-ap
      - -DSRB2_CONFIG_DEV_BUILD=OFF
      - -DRRAP_BUILD_FLATPAK=ON
      - -DRRAP_BUILD_ARCHIPELAGO_PK3=ON
      - -DRRAP_BUILD_APWORLD=OFF
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_C_FLAGS=-O3 -g -DNDEBUG -DWITH_FLATPAK
      - -DCMAKE_CXX_FLAGS=-O3 -g -DNDEBUG -DWITH_FLATPAK
    post-install:
      - mkdir -p ${FLATPAK_DEST}/share/applications
      - install -Dm644 ../io.github.TehRealSalt.RingRacersAP.desktop ${FLATPAK_DEST}/share/applications/io.github.TehRealSalt.RingRacersAP.desktop
      - mkdir -p ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps
      - install -Dm644 ../io.github.TehRealSalt.RingRacersAP.64.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/io.github.TehRealSalt.RingRacersAP.png

  - name: ringracers-assets
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/KartKrewDev/RingRacers/releases/download/v2.4/Dr.Robotnik.s-Ring-Racers-v2.4-Assets.zip
        sha256: eebad71b872c20f3323425bc4f4321b9b6256472bc485010d0a73c43fe0af120
        dest-filename: assets.zip
    build-commands:
      - mkdir -p ${FLATPAK_DEST}/share/RingRacersAP
      - unzip assets.zip -d ${FLATPAK_DEST}/share/RingRacersAP
      - rm assets.zip
