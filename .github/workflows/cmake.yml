name: RR CMake

on:
  push:
  pull_request:

jobs:
  build-game:
    strategy:
      matrix:
        config:
          - label: Windows
            os: windows-latest
            shell: msys2 {0}
            cmake_preset: ninja-x86_mingw_static_vcpkg-release

          - label: Linux
            os: ubuntu-latest
            shell: bash
            cmake_preset: ninja-vcpkg-release

    name: ${{ matrix.config.label }}
    runs-on: ${{ matrix.config.os }}
    defaults:
      run:
        shell: ${{ matrix.config.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Linux dependencies
        if: matrix.config.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential \
            curl zip nasm autoconf automake libtool pkg-config \
            libtool-bin libltdl-dev m4
  
      - name: Windows MSYS2 setup
        if: matrix.config.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw32
          update: true
          install: >-
            mingw-w64-i686-cmake
            mingw-w64-i686-ninja
            mingw-w64-i686-gcc
            git
            zip

      - name: vcpkg bootstrap cache
        uses: actions/cache@v5
        id: vcpkg-bootstrap-cache
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-bootstrap-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-bootstrap-${{ runner.os }}-

      - name: vcpkg bootstrap
        if: steps.vcpkg-bootstrap-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: vcpkg environment
        run: |
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "VCPKG_BINARY_CACHE_PATH=$LOCALAPPDATA/vcpkg/bincache" >> $GITHUB_ENV
          else
            echo "VCPKG_BINARY_CACHE_PATH=$HOME/.cache/vcpkg" >> $GITHUB_ENV
          fi

      - name: vcpkg binary sources
        run: |
          echo "VCPKG_BINARY_SOURCES=clear;files,$VCPKG_BINARY_CACHE_PATH,readwrite" >> $GITHUB_ENV

      - name: vcpkg binary cache
        uses: actions/cache@v5
        id: vcpkg-binary-cache
        with:
          path: ${{ env.VCPKG_BINARY_CACHE_PATH }}
          key: vcpkg-binary-${{ runner.os }}-${{ matrix.config.cmake_preset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-binary-${{ runner.os }}-${{ matrix.config.cmake_preset }}-
            vcpkg-binary-${{ runner.os }}-

      - name: Configure
        run: cmake --preset ${{ matrix.config.cmake_preset }} -DRRAP_BUILD_APWORLD=OFF

      - name: Build
        run: cmake --build --preset ${{ matrix.config.cmake_preset }}

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.config.label }}
          path: build/${{ matrix.config.cmake_preset }}/bin/

      - name: List build directory
        run: |
          cd build
          pwd
          ls -R .

  build-apworld:
    name: APWorld
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: cmake -B build -DRRAP_BUILD_APWORLD=ON -DRRAP_BUILD_GAME=OFF

      - name: Build
        run: cmake --build build --target rrap_apworld

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: APWorld
          path: build/bin/ringracers.apworld

      - name: List build directory
        run: |
          cd build
          pwd
          ls -R .
